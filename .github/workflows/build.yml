name: build
on:
  # Like DVUI: light CI on the default branch; full platform builds on PRs.
  push:
    branches: [ main ]
    paths-ignore:
      - "doc/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
  pull_request:
    paths-ignore:
      - "doc/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
  workflow_dispatch:

# Only one run per ref at a time; supersede in-flight runs when you push again.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs on: push to main, all PRs, and manual dispatch.
  test:
    runs-on: ubuntu-latest
    name: Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
      - name: Run tests
        # Runs both pure-logic and headless integration test targets.
        run: zig build test --summary all

  # Full builds + artifacts only for PRs and manual runs — not for push to main
  # (main already ran `zig build test` above; cross-platform is gated on review).
  x86_64-linux:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    env:
      DISPLAY: ':99.0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
      - name: Build
        run: zig build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: x86_64-linux
          path: zig-out/bin
      - name: x86_64-linux -> x86_64-windows
        run: zig build -Dtarget=x86_64-windows-gnu
  x86_64-windows:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
      - name: Build
        run: zig build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: x86_64-windows
          path: zig-out/bin
  arm64-macos:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
      - name: build
        run: zig build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: arm64-macos
          path: zig-out/bin
